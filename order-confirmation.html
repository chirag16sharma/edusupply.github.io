<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmed — EduSupply</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:    #F3F6FF;
      --sur:   #FAFCFF;
      --ink:   #060A30;
      --ink2:  #101C6C;
      --ink3:  #4858A4;
      --acc:   #E0C060;
      --aclt:  #FFFADC;
      --acdk:  #7A6000;
      --line:  #C8D0F0;
      --navy:  #060A30;
      --green: #1A7A3A;
      --gnlt:  #E8F5EE;
      --t:     .3s;
      --ease:  cubic-bezier(.4,0,.2,1);
      --sh-sm: 0 2px 14px rgba(6,10,48,.06);
      --sh-md: 0 8px 40px rgba(6,10,48,.11);
      --r:     16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; min-height:100vh; }
    h1,h2,h3 { font-family:'Playfair Display',serif; }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--line); border-radius:3px; }

    /* NAV */
    nav {
      background:rgba(243,246,255,.95);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--line);
      padding:0 2.5rem;
      height:64px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:100;
    }
    .nav-logo { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700; color:var(--ink); text-decoration:none; letter-spacing:-.02em; }
    .nav-logo span { color:var(--acc); filter:brightness(.8); }
    .nav-link { font-size:12px; font-weight:600; color:var(--ink3); text-decoration:none; padding:8px 14px; border-radius:100px; transition:background var(--t); }
    .nav-link:hover { background:rgba(6,10,48,.05); color:var(--ink); }

    /* CONTAINER */
    .wrap { max-width:860px; margin:0 auto; padding:52px 24px 80px; }

    /* ── HERO BANNER ── */
    .confirm-banner {
      background:var(--sur);
      border:1px solid var(--line);
      border-radius:24px;
      padding:40px 40px 36px;
      margin-bottom:28px;
      display:flex;
      align-items:flex-start;
      gap:24px;
      box-shadow:var(--sh-sm);
      position:relative;
      overflow:hidden;
    }
    .confirm-banner::before {
      content:'';
      position:absolute;
      top:-40px; right:-40px;
      width:180px; height:180px;
      border-radius:50%;
      background:var(--gnlt);
      opacity:.6;
      pointer-events:none;
    }
    .check-ring {
      width:64px; height:64px;
      border-radius:50%;
      background:var(--gnlt);
      border:2px solid var(--green);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;
      position:relative;
      z-index:1;
    }
    .check-ring svg { width:28px; height:28px; }
    @keyframes popIn { from{transform:scale(.3);opacity:0} to{transform:scale(1);opacity:1} }

    .banner-text { position:relative; z-index:1; }
    .banner-eyebrow {
      font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
      color:var(--green); margin-bottom:8px;
    }
    .banner-heading {
      font-size:clamp(1.6rem,3vw,2.2rem);
      font-weight:700; color:var(--ink); letter-spacing:-.03em; line-height:1.1;
      margin-bottom:8px;
    }
    .banner-sub { font-size:14px; color:var(--ink3); line-height:1.6; }

    .order-id-pill {
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:var(--navy);
      color:var(--acc);
      padding:7px 18px;
      border-radius:100px;
      font-family:'Playfair Display',serif;
      font-size:14px;
      font-weight:700;
      letter-spacing:.04em;
      margin-top:14px;
    }

    /* ── TWO-COL LAYOUT ── */
    .cols { display:grid; grid-template-columns:1fr 340px; gap:20px; align-items:start; }
    @media(max-width:720px){ .cols { grid-template-columns:1fr; } }

    /* ── CARD ── */
    .card {
      background:var(--sur);
      border:1px solid var(--line);
      border-radius:var(--r);
      overflow:hidden;
      box-shadow:var(--sh-sm);
      margin-bottom:20px;
    }
    .card-hdr {
      padding:16px 22px;
      border-bottom:1px solid var(--line);
      background:var(--bg);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .card-hdr h3 { font-size:1rem; font-weight:700; color:var(--ink); letter-spacing:-.01em; }
    .card-hdr span { font-size:11px; color:var(--ink3); }
    .card-body { padding:20px 22px; }

    /* ── ORDER ITEMS ── */
    .order-item {
      display:flex;
      align-items:center;
      gap:14px;
      padding:14px 0;
      border-bottom:1px solid var(--line);
    }
    .order-item:last-child { border-bottom:none; padding-bottom:0; }
    .item-emoji { font-size:32px; flex-shrink:0; }
    .item-info { flex:1; min-width:0; }
    .item-name { font-family:'Playfair Display',serif; font-size:.95rem; font-weight:700; color:var(--ink); margin-bottom:3px; }
    .item-meta { font-size:12px; color:var(--ink3); }
    .item-price { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:var(--ink2); white-space:nowrap; }

    /* ── PRICE SUMMARY ── */
    .price-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; font-size:13px; }
    .price-row:not(:last-child) { border-bottom:1px solid var(--line); }
    .price-row.total { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:700; color:var(--ink); }
    .price-label { color:var(--ink3); }
    .price-val { font-weight:600; color:var(--ink); }
    .price-val.free { color:var(--green); font-weight:700; }

    /* ── DELIVERY INFO ── */
    .info-row {
      display:flex; gap:12px; align-items:flex-start;
      padding:12px 0; border-bottom:1px solid var(--line);
      font-size:13px;
    }
    .info-row:last-child { border-bottom:none; padding-bottom:0; }
    .info-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
    .info-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink3); margin-bottom:3px; }
    .info-val { font-weight:500; color:var(--ink); line-height:1.5; }

    /* ── STATUS TIMELINE ── */
    .timeline { padding:8px 0; }
    .t-step {
      display:flex;
      align-items:flex-start;
      gap:14px;
      padding:10px 0;
      position:relative;
    }
    .t-step:not(:last-child)::after {
      content:'';
      position:absolute;
      left:15px;
      top:36px;
      bottom:-2px;
      width:2px;
      background:var(--line);
    }
    .t-step.done::after { background:var(--green); }

    .t-dot {
      width:30px; height:30px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:14px;
      border:2px solid var(--line);
      background:var(--sur);
      position:relative; z-index:1;
    }
    .t-step.done .t-dot { border-color:var(--green); background:var(--gnlt); }
    .t-step.active .t-dot { border-color:var(--acc); background:var(--aclt); animation:pulse 1.8s ease infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(224,192,96,.4)} 50%{box-shadow:0 0 0 6px rgba(224,192,96,0)} }

    .t-content { padding-top:4px; }
    .t-title { font-size:13px; font-weight:600; color:var(--ink); margin-bottom:2px; }
    .t-step:not(.done):not(.active) .t-title { color:var(--ink3); }
    .t-time { font-size:11px; color:var(--ink3); }

    /* ── ACTION BUTTONS ── */
    .actions { display:flex; flex-direction:column; gap:10px; }
    .btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:13px 20px; border-radius:100px;
      font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase;
      text-decoration:none; cursor:pointer; border:none;
      transition:background var(--t),transform var(--t),box-shadow var(--t);
    }
    .btn-primary { background:var(--ink); color:var(--acc); }
    .btn-primary:hover { background:var(--ink2); transform:translateY(-1px); }
    .btn-outline { background:transparent; border:1.5px solid var(--line); color:var(--ink2); }
    .btn-outline:hover { border-color:var(--ink); color:var(--ink); transform:translateY(-1px); }
    .btn-wa { background:#25D366; color:#fff; }
    .btn-wa:hover { background:#1DAD56; transform:translateY(-1px); box-shadow:0 8px 24px rgba(37,211,102,.35); }

    /* ── EST DELIVERY BADGE ── */
    .delivery-badge {
      background:var(--aclt);
      border:1px solid rgba(224,192,96,.4);
      border-radius:var(--r);
      padding:18px 20px;
      margin-bottom:20px;
      display:flex;
      align-items:center;
      gap:14px;
    }
    .delivery-icon { font-size:28px; flex-shrink:0; }
    .delivery-label { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--acdk); margin-bottom:4px; }
    .delivery-date { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--ink); }

    /* LOADING */
    .loader { display:flex; align-items:center; justify-content:center; gap:12px; min-height:60vh; color:var(--ink3); font-size:14px; }
    .spinner { width:22px; height:22px; border:2px solid var(--line); border-top-color:var(--acc); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* MOBILE */
    @media(max-width:600px){
      nav { padding:0 1.2rem; }
      .wrap { padding:32px 16px 60px; }
      .confirm-banner { padding:24px 20px; flex-direction:column; gap:16px; }
      .card-body { padding:16px; }
      .card-hdr { padding:14px 16px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Edu<span>Supply</span></a>
  <div style="display:flex;gap:6px">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="index.html" class="nav-link">Continue Shopping</a>
  </div>
</nav>

<div class="wrap" id="mainWrap">
  <div class="loader"><div class="spinner"></div> Loading your order…</div>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const params  = new URLSearchParams(location.search);
const orderId = params.get('id');
const wrap    = document.getElementById('mainWrap');

if (!orderId) {
  wrap.innerHTML = `<div class="loader">No order ID found. <a href="index.html" style="color:var(--acdk);margin-left:8px">Go home →</a></div>`;
} else {
  onAuthStateChanged(auth, async (user) => {
    try {
      const snap  = await getDoc(doc(db, 'orders', orderId));
      if (!snap.exists()) throw new Error('Order not found');
      const o = { id: snap.id, ...snap.data() };
      render(o);
    } catch(e) {
      wrap.innerHTML = `<div class="loader">Could not load order. <a href="index.html" style="color:var(--acdk);margin-left:8px">Go home →</a></div>`;
    }
  });
}

function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN'); }

function getEstDelivery(createdAt) {
  const base = createdAt ? new Date(createdAt) : new Date();
  base.setDate(base.getDate() + 2);
  /* skip Sunday */
  if (base.getDay() === 0) base.setDate(base.getDate() + 1);
  return base.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long' });
}

function getTimeline(status, createdAt) {
  const placed   = createdAt ? new Date(createdAt).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : 'Just now';
  const statuses = ['Pending','Confirmed','Dispatched','Delivered'];
  const idx      = statuses.indexOf(status);
  const steps = [
    { label:'Order Placed',   icon:'📋', time: placed,       state: idx >= 0 ? 'done'   : 'active' },
    { label:'Confirmed',      icon:'✅', time:'Within 24 hrs', state: idx >= 1 ? 'done' : idx === 0 ? 'active' : '' },
    { label:'Dispatched',     icon:'🚚', time:'2–3 business days', state: idx >= 2 ? 'done' : idx === 1 ? 'active' : '' },
    { label:'Delivered',      icon:'🏫', time:'At your school', state: idx >= 3 ? 'done' : idx === 2 ? 'active' : '' },
  ];
  return steps;
}

function render(o) {
  const shortId  = '#EDU-' + o.id.substring(0,6).toUpperCase();
  const estDate  = getEstDelivery(o.createdAt);
  const timeline = getTimeline(o.status || 'Pending', o.createdAt);

  /* Normalise items — handles both order-page.js and product.html formats */
  const items = o.items
    ? o.items
    : [{ name: o.productName, price: o.unitPrice || 0, qty: o.qty || 1, emoji: '📦' }];

  const subtotal = o.total || o.totalPrice || items.reduce((s,i)=>s+(i.price*i.qty),0);
  const delivery = subtotal >= 5000 ? 0 : 200;
  const grandTotal = subtotal + delivery;

  const name    = o.contactName   || o.customerName || '—';
  const phone   = o.contactPhone  || o.phone        || '—';
  const school  = o.schoolName    || '—';
  const address = o.deliveryAddress || o.area        || '—';
  const date    = o.deliveryDate  || o.date         || estDate;
  const note    = o.specialNote   || o.notes        || '';
  const waMsg   = encodeURIComponent(
    `Hi EduSupply! My order ${shortId} has been placed for ${school}. Please confirm when ready. Thank you!`
  );

  wrap.innerHTML = `
    <!-- BANNER -->
    <div class="confirm-banner">
      <div class="check-ring">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M5 14l7 7L23 7" stroke="#1A7A3A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="banner-text">
        <div class="banner-eyebrow">Order Successfully Placed</div>
        <h1 class="banner-heading">Thank you, ${school.split(' ')[0]}!</h1>
        <p class="banner-sub">
          We've received your order and will confirm it within 24 hours.<br/>
          A summary is below — you can also track it anytime.
        </p>
        <div class="order-id-pill">
          📦 ${shortId}
        </div>
      </div>
    </div>

    <!-- ESTIMATED DELIVERY -->
    <div class="delivery-badge">
      <div class="delivery-icon">🚚</div>
      <div>
        <div class="delivery-label">Estimated Delivery</div>
        <div class="delivery-date">${date !== estDate ? date : estDate}</div>
      </div>
    </div>

    <!-- TWO COLS -->
    <div class="cols">

      <!-- LEFT -->
      <div>

        <!-- ORDER ITEMS -->
        <div class="card">
          <div class="card-hdr">
            <h3>Order Items</h3>
            <span>${items.length} item${items.length>1?'s':''}</span>
          </div>
          <div class="card-body">
            ${items.map(i => `
              <div class="order-item">
                <div class="item-emoji">${i.emoji || '📦'}</div>
                <div class="item-info">
                  <div class="item-name">${i.name}</div>
                  <div class="item-meta">Qty: ${i.qty} · ${fmt(i.price)} each</div>
                </div>
                <div class="item-price">${fmt(i.price * i.qty)}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- PRICE SUMMARY -->
        <div class="card">
          <div class="card-hdr"><h3>Price Summary</h3></div>
          <div class="card-body">
            <div class="price-row">
              <span class="price-label">Subtotal (${items.reduce((s,i)=>s+i.qty,0)} item${items.reduce((s,i)=>s+i.qty,0)>1?'s':''})</span>
              <span class="price-val">${fmt(subtotal)}</span>
            </div>
            <div class="price-row">
              <span class="price-label">Delivery</span>
              <span class="price-val ${delivery===0?'free':''}">${delivery===0?'FREE':fmt(delivery)}</span>
            </div>
            ${delivery===0?`<div style="font-size:11px;color:var(--green);margin-top:4px">✓ Free delivery on orders above ₹5,000</div>`:''}
            <div class="price-row total" style="margin-top:8px;padding-top:14px;border-top:2px solid var(--line);">
              <span>Total</span>
              <span>${fmt(grandTotal)}</span>
            </div>
          </div>
        </div>

        <!-- DELIVERY DETAILS -->
        <div class="card">
          <div class="card-hdr"><h3>Delivery Details</h3></div>
          <div class="card-body">
            <div class="info-row">
              <div class="info-icon">🏫</div>
              <div><div class="info-label">School</div><div class="info-val">${school}</div></div>
            </div>
            <div class="info-row">
              <div class="info-icon">👤</div>
              <div><div class="info-label">Contact</div><div class="info-val">${name} · ${phone}</div></div>
            </div>
            <div class="info-row">
              <div class="info-icon">📍</div>
              <div><div class="info-label">Address / Area</div><div class="info-val">${address}</div></div>
            </div>
            ${note ? `
            <div class="info-row">
              <div class="info-icon">📝</div>
              <div><div class="info-label">Note</div><div class="info-val">${note}</div></div>
            </div>` : ''}
          </div>
        </div>

      </div>

      <!-- RIGHT -->
      <div>

        <!-- ORDER STATUS -->
        <div class="card">
          <div class="card-hdr"><h3>Order Status</h3></div>
          <div class="card-body">
            <div class="timeline">
              ${timeline.map(s => `
                <div class="t-step ${s.state}">
                  <div class="t-dot">${s.icon}</div>
                  <div class="t-content">
                    <div class="t-title">${s.label}</div>
                    <div class="t-time">${s.time}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>

        <!-- ACTIONS -->
        <div class="card">
          <div class="card-hdr"><h3>What's next?</h3></div>
          <div class="card-body">
            <div class="actions">
              <a href="dashboard.html" class="btn btn-primary">
                📦 View My Orders
              </a>
              <a href="track-order.html?id=${o.id}" class="btn btn-outline">
                📍 Track This Order
              </a>
              <a href="https://wa.me/918197739697?text=${waMsg}" target="_blank" class="btn btn-wa">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.134.559 4.133 1.535 5.87L.057 23.996l6.334-1.476A11.928 11.928 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.797 9.797 0 01-5.036-1.393l-.361-.214-3.741.873.939-3.618-.235-.373A9.797 9.797 0 012.182 12C2.182 6.58 6.58 2.182 12 2.182S21.818 6.58 21.818 12 17.42 21.818 12 21.818z"/></svg>
                Chat on WhatsApp
              </a>
              <a href="index.html#categories" class="btn btn-outline">
                🛍️ Continue Shopping
              </a>
            </div>
          </div>
        </div>

      </div>
    </div>
  `;
}
</script>
</body>
</html>
